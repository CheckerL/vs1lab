<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <section class="main__tagging tagging">
            <h2>Tagging</h2>
            <!-- ############### VS1Lab 1a Form 1 Start -->
            <form id="tag-form" action="/tagging" method="post">

                <!-- ... your code here ... -->
                <fieldset>

                    <legend>Add a new Tag</legend>
                    <div><label for="longitude">Longitude:</label><br>
                        <input type="text" id="longitude" name="longitude" placeholder="automatically captured"
                            readonly>
                    </div>

                    <div><label for="latitude">Latitude:</label><br>
                        <input type="text" id="latitude" name="latitude" placeholder="automatically captured" readonly>
                    </div>

                    <div><label for="name">Name:</label><br>
                        <input type="text" id="name" maxlength="10" placeholder="e.g. castle Karlsruhe" required>
                    </div>

                    <div><label for="hashtag">Hashtag:</label><br>
                        <input type="text" id="hashtag" name="hashtag" maxlength="11" pattern="^#.*"
                            placeholder="e.g. #castle">
                    </div><br>

                    <button type="submit">Submit Tag</button>

                </fieldset>
            </form>
            <!-- ############### VS1Lab 1a Form 1 End -->

        </section>

        <section class="main__discovery discovery">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">
                <!-- ... your code here ... -->
                <fieldset>
                    <legend>Search</legend>
                    <div>
                        <label for="search">Search term or keyword:</label>
                        <input type="search" id="search" name="search" placeholder="e.g. Karlsruhe">
                    </div>
                </fieldset>


            </form>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
