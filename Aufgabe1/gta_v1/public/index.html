<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header row">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main row">
        <section class="main__tagging tagging col-3">
            <h2>Tagging</h2>

            <!-- ############### VS1Lab 1a Form 1 Start -->
            <form id="tag-form" action="/tagging" method="post">
                <!-- ... your code here ... -->
                <fieldset>
                    <legend>Add a new GeoTag</legend>
                    
                    <div class="tagging_component">
                        <label for="tagging_latitude">Latitude:</label>
                        <input type="number" id="tagging_latitude" name="latitude" value="49.01379" readonly></input>
                    </div>

                    <div class="tagging_component">
                        <label for="tagging_longitude">Longitude:</label> 
                        <input type="number" id="tagging_longitude" name="longitude" value="8.390071" readonly></input>
                    </div>
                    
                    <div class="tagging_component">
                        <label for="tagging_name">Name:</label>
                        <input
                        type="text"
                        id="tagging_name" 
                        pattern="[A-Za-z]{1,10}"
                        placeholder="e.g. Central Berlin" 
                        name="name"
                        required>
                        </input>
                    </div>
                    
                    <div class="tagging_component">
                        <label for="tagging_hashtag">Hashtag:</label>
                        <input type="text" id="tagging_hashtag" name="hashtag" placeholder="e.g. #ber" pattern="#[A-Za-z]{0,10}"></input>
                    </div>

                    <input class="tagging_submit" type="submit" value="Add Tag"> </input>

                </fieldset>


                <!-- -->

            </form>
            <!-- ############### VS1Lab 1a Form 1 End -->

        </section>

        <section class="main__discovery discovery col-9">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">
                <fieldset>
                    <legend>Search</legend>
                    
                    <label for="discovery_searchterm">Search term or keywords:</label> 
                    <input type="text" id="discovery_searchterm" name="searchterm" placeholder="e.g. Berlin"> </input>

                    <label for="discovery_latitude"></label>
                    <input type="hidden" id="discovery_latitude" name="latitude" value="49.01379" readonly></input>
                    
                    <label for="discovery_longitude"></label>
                    <input type="hidden" id="discovery_longitude" name="longitude" value="8.390071" readonly></input>

                    <input type="submit" id="discovery_submit" value="Search"> </input>

                </fieldset>
                <!-- ... your code here ... -->

            </form>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer row">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
